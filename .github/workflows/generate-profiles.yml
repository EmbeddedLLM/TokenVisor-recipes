name: Generate Profiles
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: {}

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: tokenvisor-recipes
      - uses: actions/checkout@v4
        with:
          repository: vllm-project/recipes
          path: vllm-recipes
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyyaml httpx
      - run: python generate/generate.py
        working-directory: tokenvisor-recipes
        env:
          VLLM_RECIPES_DIR: ../vllm-recipes
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: tokenvisor-recipes/profiles
          destination_dir: profiles
          keep_files: false
